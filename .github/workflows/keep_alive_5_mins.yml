name: Keep alive each 3 mins

# Planification de l'exécution (toutes les 3 minutes)
on:
  schedule:
    - cron: '*/3 * * * *'  # Exécution toutes les 3 minutes
  workflow_dispatch:   # Ajoute l'option pour un déclenchement manuel

jobs:
  ping:
    runs-on: ubuntu-latest
    
    steps:
      - name: Pinger le service Umami
        run: |
          curl -s https://umami-dotd.onrender.com/ > /dev/null
