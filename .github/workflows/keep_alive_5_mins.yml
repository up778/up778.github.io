name: Keep alive each 5 mins

# Planification de l'exécution (toutes les 5 minutes)
on:
  schedule:
    - cron: '*/5 * * * *'  # Exécution toutes les 5 minutes

jobs:
  ping:
    runs-on: ubuntu-latest
    
    steps:
      - name: Pinger le service Umami
        run: |
          curl -s https://umami-dotd.onrender.com/ > /dev/null
